name = "deye-monitor"
main = "src/index.js"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# --- Static frontend (PWA) ---
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker runs first so /api/* is handled before falling back to static files.
run_worker_first = ["/api/*"]

# --- D1: history storage ---
[[d1_databases]]
binding = "DB"
database_name = "deye-monitor"
database_id = "00000000-0000-0000-0000-000000000000"   # local dummy; replace via `wrangler d1 create deye-monitor` before deploy

# --- Cron: poll realtime every 5 minutes -> D1 ---
[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true

# --- Non-secret config (override per environment if needed) ---
[vars]
DEYE_BASE_URL = "https://eu1-developer.deyecloud.com/v1.0"   # EMEA data center
DEYE_APP_ID = "YOUR_DEYE_APP_ID"
DEYE_EMAIL = "your-email@example.com"
DEYE_STATION_ID = "62237107"            # leave; auto-discovered via /station/list if empty
WEATHER_LAT = "12.944675"                # home location
WEATHER_LON = "100.904319"
WEATHER_PLACE = "ชลบุรี"
TMD_BASE = "https://data.tmd.go.th/nwpapi/v1/forecast/location"

# Secrets (DO NOT put here) — set via:
#   wrangler secret put DEYE_APP_SECRET
#   wrangler secret put DEYE_PASSWORD
#   wrangler secret put APP_PIN
#   wrangler secret put TMD_TOKEN        # Thai Meteorological Dept token (weather)
